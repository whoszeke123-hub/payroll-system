<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payroll System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME -->
<div class="container" id="homePage">
    <div class="logo-section">
        <div class="logo-circle">PS</div>
        <h1>PAYROLL SYSTEM</h1>
        <p>Employee Record & Salary Management</p>
    </div>

    <div class="menu">
        <button class="menu-btn" onclick="showAdd()">Add New Employee</button>
        <button class="menu-btn" onclick="showTime()">Time In & Time Out</button>
        <button class="menu-btn" onclick="showFile()">Check File</button>
        <button class="menu-btn" onclick="showSearch()">Search</button>
        <button class="menu-btn" onclick="showUpdate()">Update Info</button>
        <button class="menu-btn exit-btn" onclick="exitSystem()">Exit</button>
    </div>
</div>

<!-- ADD -->
<div class="form-container" id="addPage">
<h2>ADD EMPLOYEE</h2>

<form id="addForm">

<input id="fname" placeholder="First Name">
<small class="error" id="fnameError"></small>

<input id="mname" placeholder="Middle Name">
<small class="error" id="mnameError"></small>

<input id="lname" placeholder="Last Name">
<small class="error" id="lnameError"></small>

<input id="address" placeholder="Address">
<small class="error" id="addressError"></small>

<input id="id" placeholder="0000-000">
<small class="error" id="idError"></small>

<input id="dept" placeholder="Department">
<small class="error" id="deptError"></small>

<input id="email" placeholder="Email">
<small class="error" id="emailError"></small>

<input id="number" placeholder="11-digit Number">
<small class="error" id="numberError"></small>

<input type="date" id="date">
<small class="error" id="dateError"></small>

<input id="rate" placeholder="Rate Per Hour">
<small class="error" id="rateError"></small>

<input id="hours" placeholder="Daily Hours">
<small class="error" id="hoursError"></small>

<button class="submit-btn">SAVE</button>
</form>

<button class="back-btn" onclick="backHome()">BACK</button>
</div>

<!-- TIME -->
<div class="form-container" id="timePage">
<h2>TIME IN / OUT</h2>

<input id="timeID" placeholder="ID">
<input type="time" id="timeIn">
<input type="time" id="timeOut">

<button class="submit-btn" onclick="saveTime()">SAVE</button>
<p id="timeMsg"></p>

<button class="back-btn" onclick="backHome()">BACK</button>
</div>

<!-- FILE -->
<div class="form-container" id="filePage">
<h2>EMPLOYEE FILES</h2>
<div id="fileList"></div>
<button class="back-btn" onclick="backHome()">BACK</button>
</div>

<!-- SEARCH -->
<div class="form-container" id="searchPage">
<h2>SEARCH EMPLOYEE</h2>

<div class="search-top">
<button class="menu-btn" onclick="filterSalary('below')">Below 50k</button>
<button class="menu-btn" onclick="filterSalary('above')">Above 50k</button>
</div>

<input id="searchName" placeholder="Search Name">
<button class="menu-btn" onclick="searchByName()">SEARCH</button>

<input id="searchID" placeholder="Search ID">
<button class="menu-btn" onclick="searchByID()">SEARCH</button>

<div id="searchResult"></div>

<button class="back-btn" onclick="backHome()">BACK</button>
</div>

<!-- UPDATE -->
<div class="form-container" id="updatePage">
<h2>UPDATE EMPLOYEE</h2>

<input id="updateID" placeholder="Enter ID">
<button class="submit-btn" onclick="findEmployee()">SEARCH</button>

<p id="updateMsg"></p>

<div id="editForm" style="display:none;">
<input id="ufname">
<input id="umname">
<input id="ulname">
<input id="uaddress">
<input id="udept">
<input id="uemail">
<input id="unumber">
<input type="date" id="udate">
<input id="urate">
<input id="uhours">

<button class="submit-btn" onclick="saveUpdate()">SAVE</button>
</div>

<button class="back-btn" onclick="backHome()">BACK</button>
</div>

<script src="script.js"></script>
</body>
</html>
