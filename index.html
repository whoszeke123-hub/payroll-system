<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payroll System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME -->
<div class="container" id="homePage">

    <div class="logo-section">
        <div class="logo-circle">PS</div>
        <h1>PAYROLL SYSTEM</h1>
        <p>Employee Record & Salary Management</p>
    </div>

    <div class="menu">
        <button class="menu-btn" onclick="showAdd()">Add New Employee</button>
        <button class="menu-btn" onclick="showTime()">Time In & Time Out</button>
        <button class="menu-btn" onclick="showFile()">Check File</button>
        <button class="menu-btn" onclick="showSearch()">Search</button>
        <button class="menu-btn" onclick="showUpdate()">Update Info</button>
        <button class="menu-btn exit-btn" onclick="exitSystem()">Exit</button>
    </div>

</div>

<!-- ADD -->
<div class="form-container" id="addPage">

<h2 class="form-title">ADD EMPLOYEE</h2>

<form id="addForm">

<input id="fname" placeholder="First Name" required>
<input id="mname" placeholder="Middle Name" required>
<input id="lname" placeholder="Last Name" required>

<input id="address" placeholder="Address" required>

<input id="id" placeholder="0000-000" required>

<input id="dept" placeholder="Department" required>

<input type="email" id="email" placeholder="Email" required>

<input id="number" placeholder="11-digit Number" required>

<input type="date" id="date" required>

<input type="number" id="rate" placeholder="Rate Per Hour" required>

<input type="number" id="hours" placeholder="Daily Hours" required>

<button class="submit-btn">SAVE</button>
<button type="button" class="back-btn" onclick="backHome()">BACK</button>

</form>

</div>

<!-- TIME -->
<div class="form-container" id="timePage">

<h2 class="form-title">TIME IN / OUT</h2>

<input id="timeID" placeholder="ID">
<input type="time" id="timeIn">
<input type="time" id="timeOut">

<button class="submit-btn" onclick="saveTime()">SAVE</button>
<p id="timeMsg"></p>

<button class="back-btn" onclick="backHome()">BACK</button>

</div>

<!-- FILE -->
<div class="form-container" id="filePage">

<h2 class="form-title">EMPLOYEE FILES</h2>

<div id="fileList"></div>

<button class="back-btn" onclick="backHome()">BACK</button>

</div>

<!-- SEARCH -->
<div class="form-container" id="searchPage">

<h2 class="form-title">SEARCH EMPLOYEE</h2>

<button class="menu-btn" onclick="filterSalary('below')">Below 50,000</button>
<button class="menu-btn" onclick="filterSalary('above')">Above 50,000</button>

<input id="searchName" placeholder="Search by Name">
<button class="menu-btn" onclick="searchByName()">SEARCH NAME</button>

<input id="searchID" placeholder="Search by ID">
<button class="menu-btn" onclick="searchByID()">SEARCH ID</button>

<div id="searchResult"></div>

<button class="back-btn" onclick="backHome()">BACK</button>

</div>

<!-- UPDATE -->
<div class="form-container" id="updatePage">

<h2 class="form-title">UPDATE EMPLOYEE INFO</h2>

<input id="updateID" placeholder="Enter ID">
<button class="submit-btn" onclick="findEmployee()">SEARCH</button>

<p id="updateMsg"></p>

<div id="editForm" style="display:none">

<input id="ufname">
<input id="umname">
<input id="ulname">
<input id="uaddress">
<input id="udept">
<input id="uemail">
<input id="unumber">
<input id="udate" type="date">
<input id="urate">
<input id="uhours">

<button class="submit-btn" onclick="saveUpdate()">SAVE CHANGES</button>

</div>

<button class="back-btn" onclick="backHome()">BACK</button>

</div>

<script src="script.js"></script>
</body>
</html>
